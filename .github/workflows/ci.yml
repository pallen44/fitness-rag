name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: "true"
  NODE_ENV: test
  AI_PROVIDER_MODE: mock
  WEATHER_PROVIDER_MODE: mock
  GARMIN_SYNC_ENABLED: "false"
  STRAVA_SYNC_ENABLED: "false"

jobs:
  baseline:
    name: Install, Typecheck, Test, Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Lint
        run: corepack pnpm lint
